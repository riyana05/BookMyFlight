<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Book My Flight ✈</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --lav:#E6E6FA;--lav-mid:#C8B8E8;--lav-deep:#9B7EC8;
  --purple:#6B4FA0;--purple-dk:#4A2E7A;
  --rose:#E8B4C8;--rose-dk:#C87898;
  --pink:#E86FA0;
  --green:#50C878;--green-dk:#2E9E58;
  --glass:rgba(230,230,250,0.13);--gb:rgba(200,184,232,0.32);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#1A0A2E 0%,#2D1B4E 45%,#4A2070 75%,#200E3A 100%);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 25%,rgba(230,230,250,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 8%,rgba(230,230,250,.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 65%,rgba(230,230,250,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 82%,rgba(200,184,232,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 8% 55%,rgba(230,230,250,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 45%,rgba(230,230,250,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 48% 18%,rgba(230,230,250,.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 68% 38%,rgba(232,180,200,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 28% 92%,rgba(230,230,250,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 88%,rgba(230,230,250,.4) 0%,transparent 100%);
  animation:twinkle 5s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.6}100%{opacity:1}}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(18,6,36,.88);backdrop-filter:blur(22px);border-bottom:1px solid var(--gb);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;gap:1rem;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;background:linear-gradient(90deg,var(--lav),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.nav-tabs{display:flex;gap:.15rem;flex-wrap:wrap;}
.nav-tab{background:transparent;border:none;cursor:pointer;color:var(--lav-mid);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;padding:.4rem .7rem;border-radius:20px;transition:all .2s;white-space:nowrap;}
.nav-tab:hover{background:var(--glass);color:var(--lav);}
.nav-tab.active{background:linear-gradient(135deg,var(--purple),var(--rose-dk));color:#fff;}
.nav-right{font-size:.76rem;display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.session-pill{display:flex;align-items:center;gap:.4rem;background:rgba(155,126,200,.15);border:1px solid rgba(155,126,200,.3);border-radius:14px;padding:.28rem .75rem;color:var(--lav-mid);}
.email-pill{display:flex;align-items:center;gap:.4rem;background:rgba(155,126,200,.15);border:1px solid rgba(155,126,200,.3);border-radius:14px;padding:.28rem .75rem;color:var(--lav-mid);font-size:.74rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.signin-btn{background:linear-gradient(135deg,var(--purple),var(--rose-dk));border:none;border-radius:14px;color:#fff;padding:.36rem .9rem;font-size:.74rem;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;white-space:nowrap;}
.signin-btn:hover{filter:brightness(1.08);}
.logout-btn{background:rgba(200,184,232,.08);border:1px solid var(--gb);border-radius:8px;color:var(--lav-mid);cursor:pointer;padding:.32rem .72rem;font-size:.74rem;font-family:'DM Sans',sans-serif;transition:all .15s;}
.logout-btn:hover{background:rgba(232,80,80,.12);color:#F08080;border-color:rgba(232,80,80,.28);}

/* USER LOGIN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,4,20,.72);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:1.2rem;}
.user-login-card{background:linear-gradient(145deg,rgba(200,184,232,.12),rgba(230,230,250,.05));border:1px solid var(--gb);border-radius:22px;padding:2.3rem 2rem 2rem;width:100%;max-width:380px;text-align:center;position:relative;backdrop-filter:blur(10px);}
.modal-close{position:absolute;top:.85rem;right:1rem;background:transparent;border:none;color:var(--lav-mid);font-size:1.05rem;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--lav);}
.otp-input{letter-spacing:.6rem;text-align:center;font-size:1.35rem;font-weight:600;}
.resend-row{display:flex;justify-content:space-between;align-items:center;font-size:.74rem;color:var(--lav-mid);margin:.5rem 0 1.1rem;}
.change-email-link{cursor:pointer;text-decoration:underline;color:var(--lav-mid);background:none;border:none;font-size:.74rem;font-family:'DM Sans',sans-serif;}
.resend-link{color:var(--rose);cursor:pointer;background:none;border:none;font-size:.74rem;font-family:'DM Sans',sans-serif;}
.resend-link:disabled{color:var(--lav-mid);cursor:not-allowed;opacity:.6;text-decoration:none;}

/* PAGE */
.page{position:relative;z-index:1;min-height:calc(100vh - 64px);}

/* HERO */
.hero{text-align:center;padding:3.5rem 2rem 1.5rem;}
.hero-eye{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--rose);margin-bottom:.9rem;font-weight:500;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5.5vw,4.5rem);font-weight:300;line-height:1.1;color:var(--lav);margin-bottom:.6rem;}
.hero-title em{font-style:italic;color:var(--rose);}
.hero-sub{color:var(--lav-mid);font-size:.92rem;font-weight:300;}

/* SEARCH */
.search-wrap{padding:0 2rem;}
.search-bar{background:rgba(200,184,232,.07);border:1px solid var(--gb);border-radius:50px;padding:.52rem 1.2rem;display:flex;align-items:center;gap:.7rem;max-width:460px;margin:0 auto 1.1rem;}
.search-bar input{background:none;border:none;outline:none;color:var(--lav);font-family:'DM Sans',sans-serif;font-size:.86rem;flex:1;}
.search-bar input::placeholder{color:rgba(200,184,232,.38);}
.filter-row{display:flex;gap:.42rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.3rem;}
.chip{background:rgba(200,184,232,.07);border:1px solid var(--gb);border-radius:20px;padding:.28rem .88rem;color:var(--lav-mid);font-size:.76rem;cursor:pointer;transition:all .15s;font-weight:500;}
.chip:hover,.chip.on{background:linear-gradient(135deg,var(--purple),var(--rose-dk));border-color:transparent;color:#fff;}

/* DEALS */
.deals-hdr{max-width:1160px;margin:1.4rem auto 1.1rem;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:600;color:var(--lav);}
.live-badge{display:flex;align-items:center;gap:.42rem;background:rgba(232,111,160,.12);border:1px solid var(--pink);border-radius:20px;padding:.28rem .82rem;color:var(--pink);font-size:.73rem;font-weight:600;letter-spacing:.05em;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--pink);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
.deals-grid{max-width:1160px;margin:0 auto;padding:0 2rem 2.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.3rem;}

/* DEAL CARD */
.deal-card{background:linear-gradient(145deg,rgba(200,184,232,.09),rgba(230,230,250,.04));border:1px solid var(--gb);border-radius:20px;padding:1.35rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;backdrop-filter:blur(8px);}
.deal-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,180,200,.07),rgba(155,126,200,.07));opacity:0;transition:opacity .3s;}
.deal-card:hover{transform:translateY(-4px);box-shadow:0 16px 38px rgba(107,79,160,.28);border-color:var(--lav-mid);}
.deal-card:hover::before{opacity:1;}
.deal-card.expired{opacity:.4;pointer-events:none;}
.deal-card.featured{border-color:var(--rose);}
.dbadge{position:absolute;top:.85rem;right:.85rem;background:linear-gradient(135deg,var(--purple),var(--lav-deep));color:#fff;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .58rem;border-radius:8px;}
.deal-card.featured .dbadge{background:linear-gradient(135deg,var(--pink),var(--rose-dk));}
.deal-route{display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem;}
.d-city{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--lav);line-height:1;}
.d-city small{display:block;font-size:.7rem;color:var(--lav-mid);font-family:'DM Sans',sans-serif;font-weight:400;}
.d-arrow{color:var(--rose);font-size:1.05rem;flex-shrink:0;}
.deal-bottom{display:flex;justify-content:space-between;align-items:flex-end;margin-top:.85rem;padding-top:.85rem;border-top:1px solid rgba(200,184,232,.16);}
.d-price{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:var(--rose);line-height:1;}
.d-price small{font-size:.9rem;color:var(--lav-mid);}
.d-meta{text-align:right;}
.d-airline{color:var(--lav-mid);font-size:.73rem;}
.d-class{color:var(--lav);font-size:.8rem;font-weight:500;}
.d-timer{margin-top:.6rem;font-size:.7rem;color:var(--rose-dk);display:flex;align-items:center;gap:.28rem;}
.book-btn{width:100%;margin-top:.85rem;padding:.68rem;background:linear-gradient(135deg,var(--purple),var(--rose-dk));border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.03em;}
.book-btn:hover{transform:scale(1.02);box-shadow:0 4px 15px rgba(107,79,160,.4);}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(18,6,36,.9);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(145deg,#2D1B4E,#1E0F38);border:1px solid var(--gb);border-radius:22px;width:100%;max-width:530px;max-height:92vh;overflow-y:auto;padding:1.85rem;position:relative;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-x{position:absolute;top:.9rem;right:.9rem;background:rgba(200,184,232,.1);border:1px solid var(--gb);border-radius:50%;width:32px;height:32px;color:var(--lav-mid);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-x:hover{background:rgba(200,184,232,.2);color:var(--lav);}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;color:var(--lav);margin-bottom:.2rem;}
.modal-sub{color:var(--lav-mid);font-size:.8rem;margin-bottom:1.3rem;}
.route-disp{background:rgba(200,184,232,.07);border:1px solid var(--gb);border-radius:12px;padding:.85rem 1.05rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem;}
.rc-lg{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--lav);font-weight:600;}
.rc-lg small{display:block;font-size:.68rem;color:var(--lav-mid);font-family:'DM Sans',sans-serif;}

/* FORM */
.fsec{margin-bottom:1rem;}
.fsec label{display:block;font-size:.72rem;font-weight:600;color:var(--lav-mid);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.42rem;}
.finput{width:100%;padding:.67rem .9rem;background:rgba(200,184,232,.07);border:1px solid var(--gb);border-radius:10px;color:var(--lav);font-family:'DM Sans',sans-serif;font-size:.86rem;transition:border-color .2s;outline:none;}
.finput::placeholder{color:rgba(200,184,232,.33);}
.finput:focus{border-color:var(--lav-deep);background:rgba(200,184,232,.1);}
.finput.err{border-color:#E85050;}
.errtxt{color:#E85050;font-size:.7rem;margin-top:.25rem;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;}
select.finput option{background:#2D1B4E;}

/* CALENDAR */
.cal-wrap{background:rgba(200,184,232,.06);border:1px solid var(--gb);border-radius:14px;padding:1rem;margin-top:.42rem;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;}
.cal-nav-btn{background:rgba(200,184,232,.1);border:1px solid var(--gb);border-radius:8px;color:var(--lav-mid);cursor:pointer;padding:.28rem .6rem;font-size:.85rem;transition:all .15s;}
.cal-nav-btn:hover{background:rgba(200,184,232,.2);color:var(--lav);}
.cal-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--lav);font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.22rem;}
.cal-dow{font-size:.62rem;font-weight:700;color:var(--lav-mid);text-align:center;padding:.28rem 0;letter-spacing:.05em;text-transform:uppercase;}
.cal-day{aspect-ratio:1;border-radius:8px;font-size:.75rem;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:1px solid transparent;color:var(--lav);}
.cal-day:hover:not(.cal-day-disabled):not(.cal-day-unavail):not(.cal-day-past){background:rgba(155,126,200,.18);border-color:var(--lav-deep);}
.cal-day-past{color:rgba(200,184,232,.25);cursor:not-allowed;}
.cal-day-disabled{background:transparent;cursor:not-allowed;}
.cal-day-unavail{background:rgba(232,80,80,.08);border-color:rgba(232,80,80,.2);color:rgba(232,140,140,.5);cursor:not-allowed;text-decoration:line-through;text-decoration-color:rgba(232,80,80,.4);}
.cal-day-selected{background:linear-gradient(135deg,var(--purple),var(--rose-dk))!important;border-color:transparent!important;color:#fff!important;box-shadow:0 2px 10px rgba(107,79,160,.4);}
.cal-day-today{border-color:var(--lav-mid);}

.cal-legend{display:flex;gap:.9rem;margin-top:.75rem;flex-wrap:wrap;}
.cl-item{display:flex;align-items:center;gap:.3rem;font-size:.65rem;color:var(--lav-mid);}
.cl-dot{width:10px;height:10px;border-radius:3px;}
.cal-loading{text-align:center;padding:1.5rem;color:var(--lav-mid);font-size:.8rem;}
.selected-date-display{background:rgba(107,79,160,.18);border:1px solid rgba(155,126,200,.35);border-radius:9px;padding:.5rem .85rem;font-size:.82rem;color:var(--lav);margin-top:.5rem;display:flex;align-items:center;gap:.4rem;}

/* FLEXIBLE DATE CALENDAR */


/* SEAT SELECTOR */
.seat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.28rem;margin-top:.42rem;}
.seat{aspect-ratio:1;border-radius:5px;cursor:pointer;border:1px solid rgba(200,184,232,.26);background:rgba(200,184,232,.05);font-size:.48rem;color:var(--lav-mid);display:flex;align-items:center;justify-content:center;transition:all .12s;font-weight:600;}
.seat:hover{background:rgba(155,126,200,.17);border-color:var(--lav-deep);}
.seat.sel{background:linear-gradient(135deg,var(--purple),var(--rose-dk));border-color:transparent;color:#fff;}
.seat.taken{background:rgba(200,184,232,.03);border-color:rgba(200,184,232,.08);color:rgba(200,184,232,.16);cursor:not-allowed;}
.seat.aisle{border:none;background:transparent;cursor:default;}
.seat-leg{display:flex;gap:.85rem;margin-top:.42rem;}
.sl-i{display:flex;align-items:center;gap:.28rem;font-size:.64rem;color:var(--lav-mid);}
.sl-d{width:9px;height:9px;border-radius:3px;}

/* PRICE SUMMARY */
.price-sum{background:rgba(232,111,160,.07);border:1px solid rgba(232,111,160,.16);border-radius:12px;padding:.9rem 1.05rem;margin:1.05rem 0;}
.prow{display:flex;justify-content:space-between;font-size:.8rem;color:var(--lav-mid);margin-bottom:.32rem;}
.prow.total{color:var(--rose);font-weight:700;font-size:1.02rem;border-top:1px solid rgba(200,184,232,.16);padding-top:.42rem;margin-top:.42rem;}

.submit-btn{width:100%;padding:.82rem;background:linear-gradient(135deg,#8B5CF6,#EC4899);border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:all .2s;box-shadow:0 4px 18px rgba(139,92,246,.28);}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 26px rgba(139,92,246,.4);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* SUCCESS */
.success{text-align:center;padding:.7rem 0;}
.sicon{font-size:3.5rem;margin-bottom:.8rem;display:block;animation:bounceIn .5s ease;}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.stitle{font-family:'Cormorant Garamond',serif;font-size:1.85rem;color:var(--lav);margin-bottom:.35rem;}
.ssub{color:var(--lav-mid);margin-bottom:1.2rem;font-size:.85rem;}
.bref-box{background:rgba(200,184,232,.07);border:1px solid var(--gb);border-radius:10px;padding:.85rem;font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:700;color:var(--rose);letter-spacing:.15em;margin-bottom:.85rem;}
.bref-box small{display:block;font-size:.7rem;color:var(--lav-mid);font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:0;}
.confirm-details{background:rgba(200,184,232,.06);border:1px solid var(--gb);border-radius:10px;padding:.8rem 1rem;font-size:.8rem;color:var(--lav-mid);margin-bottom:1.2rem;text-align:left;line-height:1.8;}
.confirm-details strong{color:var(--lav);}

/* BOOKINGS PAGE */
.pg-wrap{max-width:900px;margin:0 auto;padding:2rem;}
.pg-hdr h2{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--lav);margin-bottom:.28rem;}
.pg-hdr p{color:var(--lav-mid);font-size:.88rem;margin-bottom:1.6rem;}
.phone-form{display:flex;gap:.65rem;margin-bottom:1.8rem;flex-wrap:wrap;}
.bk-item{background:rgba(200,184,232,.07);border:1px solid var(--gb);border-radius:14px;padding:1.05rem 1.2rem;margin-bottom:.85rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;}
.bk-ref{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--rose);min-width:88px;}
.bk-info{flex:1;}
.bk-route{font-size:1.02rem;color:var(--lav);font-weight:500;}
.bk-det{font-size:.74rem;color:var(--lav-mid);margin-top:.2rem;}
.bk-price{font-family:'Cormorant Garamond',serif;font-size:1.45rem;color:var(--rose);font-weight:700;}
.badge{font-size:.64rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.2rem .58rem;border-radius:6px;}
.badge-ok{background:rgba(80,200,120,.12);color:#50C878;border:1px solid rgba(80,200,120,.26);}
.session-note{background:rgba(155,126,200,.1);border:1px solid rgba(155,126,200,.25);border-radius:10px;padding:.75rem 1rem;font-size:.78rem;color:var(--lav-mid);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem;}
.flight-date-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(107,79,160,.2);border:1px solid rgba(155,126,200,.3);border-radius:6px;padding:.15rem .5rem;font-size:.7rem;color:var(--lav-mid);margin-top:.2rem;}

/* ADMIN */
.admin-login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:2rem;}
.admin-login-card{background:linear-gradient(145deg,rgba(200,184,232,.1),rgba(230,230,250,.04));border:1px solid var(--gb);border-radius:22px;padding:2.4rem;width:100%;max-width:390px;text-align:center;backdrop-filter:blur(10px);}
.login-icon{font-size:2.6rem;margin-bottom:.9rem;display:block;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:1.95rem;color:var(--lav);margin-bottom:.28rem;}
.login-sub{color:var(--lav-mid);font-size:.82rem;margin-bottom:1.6rem;}
.login-err{background:rgba(232,80,80,.1);border:1px solid rgba(232,80,80,.22);border-radius:8px;padding:.55rem .85rem;color:#F08080;font-size:.78rem;margin-bottom:.9rem;text-align:left;}
.demo-creds{margin-top:1.1rem;font-size:.7rem;color:var(--lav-mid);background:rgba(200,184,232,.07);border:1px solid var(--gb);border-radius:8px;padding:.6rem .85rem;text-align:left;}
.admin-wrap{max-width:980px;margin:0 auto;padding:2rem;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.8rem;}
.stat-card{background:rgba(200,184,232,.08);border:1px solid var(--gb);border-radius:12px;padding:1.1rem;text-align:center;}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── API HELPER ── */
async function api(method, path, body) {
  const opts = { method, credentials:'include', headers:{'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch('/api' + path, opts);
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

/* ── TIMER ── */
function useTimer(secondsLeft) {
  const [rem, setRem] = useState(secondsLeft);
  useEffect(() => {
    if (rem <= 0) return;
    const t = setInterval(() => setRem(r => Math.max(0, r - 1)), 1000);
    return () => clearInterval(t);
  }, []);
  const h = Math.floor(rem/3600), m = Math.floor((rem%3600)/60), s = rem%60;
  return { rem, label:`${h>0?h+'h ':''}${m}m ${s}s` };
}

/* ── DATE HELPERS ── */
function toYMD(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function formatDisplay(ymd) {
  if (!ymd) return '';
  const [y,m,d] = ymd.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d} ${months[Number(m)-1]} ${y}`;
}
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function weatherIcon(cond) {
  const map = {'Sunny':'☀️','Partly Cloudy':'⛅','Cloudy':'☁️','Light Rain':'🌦','Heavy Rain':'🌧','Thunderstorm':'⛈','Clear':'🌙','Hazy':'🌫'};
  return map[cond] || '🌤';
}

/* ── CALENDAR ── */
function FlightCalendar({ unavailableDates, loading, selected, onSelect }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const maxDate = new Date(today); maxDate.setMonth(maxDate.getMonth()+3);
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const todayYMD = toYMD(today), maxYMD = toYMD(maxDate);
  const minNav = today.getMonth() + today.getFullYear()*12;
  const maxNav = maxDate.getMonth() + maxDate.getFullYear()*12;
  const curNav = viewMonth + viewYear*12;
  function prevMonth() { if(curNav<=minNav)return; viewMonth===0?[setViewMonth(11),setViewYear(y=>y-1)]:setViewMonth(m=>m-1); }
  function nextMonth() { if(curNav>=maxNav)return; viewMonth===11?[setViewMonth(0),setViewYear(y=>y+1)]:setViewMonth(m=>m+1); }
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  return (
    <div className="cal-wrap">
      <div className="cal-nav">
        <button className="cal-nav-btn" onClick={prevMonth} disabled={curNav<=minNav}>◀</button>
        <div className="cal-month">{MONTHS[viewMonth]} {viewYear}</div>
        <button className="cal-nav-btn" onClick={nextMonth} disabled={curNav>=maxNav}>▶</button>
      </div>
      {loading ? <div className="cal-loading">⏳ Loading dates…</div> : (
        <>
          <div className="cal-grid">
            {DAYS.map(d => <div key={d} className="cal-dow">{d}</div>)}
            {cells.map((day, idx) => {
              if (!day) return <div key={'e'+idx} className="cal-day cal-day-disabled"/>;
              const ymd = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              const isPast=ymd<todayYMD, isBeyond=ymd>maxYMD, isUnavail=unavailableDates.includes(ymd);
              const isSel=ymd===selected, isToday=ymd===todayYMD;
              let cls='cal-day';
              if(isSel) cls+=' cal-day-selected';
              else if(isPast||isBeyond) cls+=' cal-day-past';
              else if(isUnavail) cls+=' cal-day-unavail';
              else if(isToday) cls+=' cal-day-today';
              return (
                <div key={ymd} className={cls}
                  onClick={()=>!isPast&&!isBeyond&&!isUnavail&&onSelect(isSel?'':ymd)}
                  title={isUnavail?'Unavailable':''}>
                  {day}
                </div>
              );
            })}
          </div>
          <div className="cal-legend">
            <div className="cl-item"><div className="cl-dot" style={{background:'linear-gradient(135deg,#6B4FA0,#C87898)'}}/><span>Selected</span></div>
            <div className="cl-item"><div className="cl-dot" style={{background:'rgba(232,80,80,.15)',border:'1px solid rgba(232,80,80,.3)'}}/><span>Unavailable</span></div>
          </div>
          {selected && <div className="selected-date-display">✈ Flight date: <strong style={{color:'var(--rose)'}}>{formatDisplay(selected)}</strong></div>}
        </>
      )}
    </div>
  );
}

/* ── SEAT SELECTOR ── */
function SeatSelector({ dealId, taken, selected, onSelect }) {
  const rows = [1,2,3,4,5,6], cols = ['A','B','C',null,'D','E','F'];
  return (
    <div>
      <div className="seat-grid">
        {rows.map(r => cols.map((c,ci) => {
          if (!c) return <div key={`${r}-aisle`} className="seat aisle"/>;
          const id=`${r}${c}`, isTaken=taken.includes(id), isSel=selected===id;
          return <div key={id} className={`seat${isTaken?' taken':''}${isSel?' sel':''}`}
            onClick={()=>!isTaken&&onSelect(isSel?null:id)}>{r}{c}</div>;
        }))}
      </div>
      <div className="seat-leg">
        <div className="sl-i"><div className="sl-d" style={{background:'rgba(200,184,232,.06)',border:'1px solid rgba(200,184,232,.26)'}}/><span>Available</span></div>
        <div className="sl-i"><div className="sl-d" style={{background:'linear-gradient(135deg,#6B4FA0,#C87898)'}}/><span>Selected</span></div>
        <div className="sl-i"><div className="sl-d" style={{background:'rgba(200,184,232,.03)',border:'1px solid rgba(200,184,232,.08)'}}/><span>Taken</span></div>
      </div>
    </div>
  );
}

/* ── WEATHER PANEL ── */
function WeatherPanel({ city }) {
  const [data, setData] = useState(null);
  const [input, setInput] = useState(city || '');
  const [loading, setLoading] = useState(false);
  function load(c) {
    if (!c) return;
    setLoading(true);
    api('GET', `/weather?city=${encodeURIComponent(c)}`)
      .then(r => { setData(r.data); setLoading(false); })
      .catch(() => setLoading(false));
  }
  useEffect(() => { if (city) load(city); }, [city]);
  const cities = ['Mumbai','Delhi','Bangalore','Chennai','Kolkata','Hyderabad','Goa','Pune','Ahmedabad','Jaipur'];
  return (
    <div>
      <div className="sec-hdr">🌤 Destination Weather</div>
      <div style={{display:'flex',gap:'.5rem',marginBottom:'.6rem',flexWrap:'wrap'}}>
        <input className="finput" style={{maxWidth:220}} placeholder="Enter city…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&load(input)}/>
        <button className="submit-btn" style={{width:'auto',padding:'.65rem 1.1rem'}} onClick={()=>load(input)}>Check →</button>
      </div>
      <div style={{display:'flex',gap:'.35rem',flexWrap:'wrap',marginBottom:'.8rem'}}>
        {cities.map(c=><div key={c} className={`chip${input===c?' on':''}`} onClick={()=>{setInput(c);load(c);}}>{c}</div>)}
      </div>
      {loading && <div className="cal-loading">⏳ Fetching weather…</div>}
      {data && (
        <div className="weather-card">
          <div className="weather-main">
            <div className="weather-icon">{weatherIcon(data.condition)}</div>
            <div>
              <div className="weather-temp">{data.temperature}°C</div>
              <div className="weather-cond">{data.condition} · {data.city}</div>
            </div>
          </div>
          <div className="weather-stats">
            <div className="w-stat"><div className="w-stat-val">{data.humidity}%</div><div className="w-stat-lbl">Humidity</div></div>
            <div className="w-stat"><div className="w-stat-val">{data.windSpeed} km/h</div><div className="w-stat-lbl">Wind</div></div>
            <div className="w-stat"><div className="w-stat-val">{data.feelsLike}°C</div><div className="w-stat-lbl">Feels Like</div></div>
          </div>
          <div style={{fontSize:'.75rem',color:'var(--lav-mid)',marginBottom:'.5rem'}}>5-Day Forecast</div>
          <div className="forecast-row">
            {data.forecast.map(f=>(
              <div key={f.date} className="forecast-day">
                <div className="fc-date">{formatDisplay(f.date).slice(0,6)}</div>
                <div className="fc-icon">{weatherIcon(f.condition)}</div>
                <div className="fc-temp">{f.high}° / {f.low}°</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── FLIGHT STATUS PANEL ── */
function FlightStatusPanel() {
  const [from, setFrom] = useState('BOM');
  const [to, setTo]     = useState('DEL');
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const airports = ['BOM','DEL','BLR','CCU','MAA','HYD','GOI','PNQ','AMD'];
  function load() {
    setLoading(true);
    api('GET', `/flights/status?from=${from}&to=${to}`)
      .then(r => { setData(r.data); setLoading(false); })
      .catch(() => setLoading(false));
  }
  useEffect(() => { load(); }, []);
  const statusClass = s => ({
    'On Time':'status-ontime','Delayed':'status-delayed','Boarding':'status-boarding',
    'Cancelled':'status-cancelled','Departed':'status-departed','Arrived':'status-arrived'
  }[s]||'status-ontime');
  return (
    <div>
      <div className="sec-hdr">🛫 Live Flight Status</div>
      <div style={{display:'flex',gap:'.5rem',alignItems:'flex-end',flexWrap:'wrap',marginBottom:'.6rem'}}>
        <div className="fsec" style={{marginBottom:0}}>
          <label>From</label>
          <select className="finput" value={from} onChange={e=>setFrom(e.target.value)}>{airports.map(a=><option key={a}>{a}</option>)}</select>
        </div>
        <div className="fsec" style={{marginBottom:0}}>
          <label>To</label>
          <select className="finput" value={to} onChange={e=>setTo(e.target.value)}>{airports.map(a=><option key={a}>{a}</option>)}</select>
        </div>
        <button className="submit-btn" style={{width:'auto',padding:'.67rem 1.1rem',marginBottom:0}} onClick={load}>Check Status →</button>
      </div>
      {loading && <div className="cal-loading">⏳ Fetching status…</div>}
      {data && (
        <div className="status-card">
          <div className="status-header">
            <div>
              <div style={{fontSize:'1rem',fontWeight:600,color:'var(--lav)'}}>{data.flight}</div>
              <div style={{fontSize:'.75rem',color:'var(--lav-mid)'}}>{data.from} → {data.to}</div>
            </div>
            <span className={`status-badge ${statusClass(data.status)}`}>{data.status}</span>
          </div>
          {data.delayMinutes>0 && <div className="api-err" style={{marginBottom:'.8rem'}}>⚠ Delayed by {data.delayMinutes} minutes</div>}
          <div className="status-grid">
            <div className="s-item"><div className="s-label">Terminal</div><div className="s-val">{data.terminal}</div></div>
            <div className="s-item"><div className="s-label">Gate</div><div className="s-val">{data.gate}</div></div>
            <div className="s-item"><div className="s-label">Departure</div><div className="s-val">{formatTime(data.departure)}</div></div>
            <div className="s-item"><div className="s-label">Arrival</div><div className="s-val">{formatTime(data.arrival)}</div></div>
          </div>
          <div style={{fontSize:'.65rem',color:'var(--lav-mid)',marginTop:'.7rem',textAlign:'right'}}>Last updated: {formatTime(data.updatedAt)}</div>
        </div>
      )}
    </div>
  );
}

/* ── NEARBY AIRPORTS ── */

              <div className="alt-saving">

                <div className="alt-save-val">{a.saving}</div>
              </div>
            </div>
          ))}
        </div>

/* ── CARBON CALCULATOR ── */
function CarbonCalculator() {
  const [from, setFrom] = useState('BOM');
  const [to, setTo]     = useState('DEL');
  const [pax, setPax]   = useState('1');
  const [cls, setCls]   = useState('Economy');
  const [data, setData] = useState(null);
  const [offsetDone, setOffsetDone] = useState(false);
  const airports = ['BOM','DEL','BLR','CCU','MAA','HYD','GOI','PNQ','AMD'];
  function calc() {
    api('GET', `/carbon?from=${from}&to=${to}&passengers=${pax}&seatClass=${encodeURIComponent(cls)}`)
      .then(r=>setData(r.data)).catch(()=>{});
  }
  useEffect(()=>calc(),[]);
  return (
    <div>
      <div className="sec-hdr">🌱 Carbon Footprint Calculator</div>
      <div className="info-box">✈ Aviation accounts for about 2.5% of global CO₂ emissions. Know your impact.</div>
      <div className="frow" style={{marginBottom:'.8rem'}}>
        <div className="fsec" style={{marginBottom:0}}><label>From</label>
          <select className="finput" value={from} onChange={e=>setFrom(e.target.value)}>{airports.map(a=><option key={a}>{a}</option>)}</select>
        </div>
        <div className="fsec" style={{marginBottom:0}}><label>To</label>
          <select className="finput" value={to} onChange={e=>setTo(e.target.value)}>{airports.map(a=><option key={a}>{a}</option>)}</select>
        </div>
      </div>
      <div className="frow" style={{marginBottom:'.8rem'}}>
        <div className="fsec" style={{marginBottom:0}}><label>Passengers</label>
          <select className="finput" value={pax} onChange={e=>setPax(e.target.value)}>
            {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div className="fsec" style={{marginBottom:0}}><label>Class</label>
          <select className="finput" value={cls} onChange={e=>setCls(e.target.value)}>
            <option>Economy</option><option>Premium Economy</option><option>Business</option>
          </select>
        </div>
      </div>
      <button className="submit-btn" style={{marginBottom:'1rem'}} onClick={calc}>Calculate →</button>
      {data && (
        <div className="carbon-card">
          <div className="carbon-main">
            <div>
              <div style={{fontSize:'.72rem',color:'var(--lav-mid)',textTransform:'uppercase',letterSpacing:'.05em'}}>Total CO₂ emitted</div>
              <div style={{display:'flex',alignItems:'baseline',gap:'.3rem'}}>
                <div className="carbon-num">{data.totalCo2}</div>
                <div className="carbon-unit">kg CO₂</div>
              </div>
              <div style={{fontSize:'.73rem',color:'var(--lav-mid)'}}>({data.co2PerPassenger} kg per passenger · {data.distance} km route)</div>
            </div>
          </div>
          <div className="carbon-stats">
            <div className="carbon-bar"><div className="carbon-bar-val">🌳 {data.treesNeeded}</div><div className="carbon-bar-lbl">Trees needed (1 yr)</div></div>
            <div className="carbon-bar"><div className="carbon-bar-val">🚗 {data.carEquivalentKm} km</div><div className="carbon-bar-lbl">Car equivalent</div></div>
            <div className="carbon-bar"><div className="carbon-bar-val">₹{data.offsetCost}</div><div className="carbon-bar-lbl">Offset cost</div></div>
          </div>
          <button className="offset-btn" onClick={()=>setOffsetDone(true)} disabled={offsetDone}>
            {offsetDone ? '✅ Thank you for offsetting your carbon!' : `🌱 Offset for ₹${data.offsetCost} →`}
          </button>
        </div>
      )}
    </div>
  );
}

/* ── FOOD OPTIONS ── */

  const [data, setData] = useState(null);

    api('GET', `/flights/food?airline=${a}&seatClass=${encodeURIComponent(c)}`)

  return (
    <div>

      <div className="frow" style={{marginBottom:'.9rem'}}>
        <div className="fsec" style={{marginBottom:0}}><label>Airline</label>
          <select className="finput" value={sel.airline} onChange={e=>{setSel(s=>({...s,airline:e.target.value}));load(e.target.value,sel.cls);}}>
            {airlines.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div className="fsec" style={{marginBottom:0}}><label>Class</label>
          <select className="finput" value={sel.cls} onChange={e=>{setSel(s=>({...s,cls:e.target.value}));load(sel.airline,e.target.value);}}>
            {classes.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
      </div>
      {data && (
        <div className="food-card">
          <div style={{fontSize:'.75rem',color:'var(--lav-mid)',marginBottom:'.8rem'}}>{data.airline} · {data.seatClass} — Menu</div>
          {data.items.map(item=>(
            <div key={item.name} className="food-item">
              <div className="food-icon">{item.icon}</div>
              <div><div className="food-name">{item.name}</div><div className="food-type">{item.type}</div></div>
              <div className="food-price">
                {item.included ? <div className="food-included">✓ Included</div> : <div className="food-price-val">₹{item.price}</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── MULTI-CITY ── */

  const [legs, setLegs] = useState([{from:'BOM',to:'DEL'},{from:'DEL',to:'BLR'}]);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  function addLeg() { setLegs(l=>[...l,{from:'BLR',to:'CCU'}]); }
  function removeLeg(i) { setLegs(l=>l.filter((_,j)=>j!==i)); }
  function setLeg(i,k,v) { setLegs(l=>l.map((leg,j)=>j===i?{...leg,[k]:v}:leg)); }
  function search() {
    setLoading(true);
    const legStr = legs.map(l=>`${l.from}-${l.to}`).join(',');
    api('GET', `/multicity/fare?legs=${legStr}`)
      .then(r=>{ setResult(r.data); setLoading(false); })
      .catch(()=>setLoading(false));
  }
  return (
    <div className="page">
      <div className="multicity-wrap">
        <div className="pg-hdr"><h2>Multi-City Trip Planner</h2><p>Plan trips with multiple destinations and save with our multi-city discount</p></div>
        {legs.map((leg,i)=>(
          <div key={i} className="mc-leg">
            <div className="mc-leg-num">LEG {i+1}</div>

const CHATBOT_KNOWLEDGE = {
  'baggage': 'For domestic flights: Economy allows 15kg check-in + 7kg cabin. Business gets 35kg check-in. Excess baggage is charged at ₹500–800/kg.',
  'checkin': 'Online check-in opens 48 hours before departure and closes 2 hours before. Airport check-in closes 45 mins before departure.',
  'cancel': 'Cancellation charges: 0–24h before flight: 100% fee. 24–48h: 50% fee. 48h+ before: ₹2000–3500 flat fee depending on airline.',
  'refund': 'Refunds are processed in 7–10 business days for credit/debit cards, and 5–7 days for UPI/net banking.',
  'seat': 'Seat selection is free at check-in (subject to availability). Premium seats (extra legroom, exit row) cost ₹500–2000 extra.',
  'meal': 'Use our 🍽 Food Options tab to pre-book meals. Meals must be ordered at least 24 hours before departure.',
  'delay': 'For delays over 2 hours: you\'re entitled to free meals at the airport. Delays over 24 hours entitle you to a hotel stay. Check our Live Status tab.',
  'visa': 'For domestic travel, you need a government-issued photo ID (Aadhaar, PAN, passport, or voter ID).',
  'infant': 'Infants under 2 travel at 10% of adult fare. They don\'t get a separate seat and must sit on a guardian\'s lap.',
  'pet': 'Pets are allowed as checked baggage on select airlines. Contact the airline at least 48 hours in advance.',
  'carbon': 'Use our 🌱 Carbon Calculator tab to check and offset your flight\'s environmental impact.',
  'booking': 'You can book with just your phone number — no account needed! Enter your number on the deals page.',
};

function Chatbot({ onClose }) {
  const [msgs, setMsgs] = useState([
    { role:'bot', text:'✈ Hi! I\'m your BookMyFlight assistant. Ask me about baggage, check-in, cancellations, meals, or any booking query!' }
  ]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const endRef = useRef(null);
  const quickReplies = ['Baggage policy','Check-in time','Cancel/Refund','Seat selection','Meal options'];

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  function getBotReply(text) {
    const t = text.toLowerCase();
    for (const [key, val] of Object.entries(CHATBOT_KNOWLEDGE)) {
      if (t.includes(key)) return val;
    }
    if (t.includes('hello')||t.includes('hi')||t.includes('hey')) return '👋 Hello! How can I help you with your flight booking today?';
    if (t.includes('thank')) return 'You\'re welcome! Have a wonderful flight! ✈';
    if (t.includes('price')||t.includes('fare')||t.includes('cost')) return 'Check our Deals tab for the latest fares across all routes!';
    if (t.includes('weather')) return 'Check our Weather tab to see the forecast for your destination city!';
    if (t.includes('status')) return 'Use the Flight Status tab (in Services) to check live departure/arrival status!';
    return 'I\'m not sure about that specific query. Please contact our support at support@bookmyflight.com or call 1800-123-4567. I can help with: baggage, check-in, cancellations, meals, seat selection!';
  }

  function send(text) {
    const msg = text || input;
    if (!msg.trim()) return;
    setMsgs(m=>[...m,{role:'user',text:msg}]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      setMsgs(m=>[...m,{role:'bot',text:getBotReply(msg)}]);
      setTyping(false);
    }, 600 + Math.random()*400);
  }

  return (
    <div className="chatbot-panel">
      <div className="chatbot-header">
        <div className="chatbot-title">🤖 Travel Assistant</div>
        <button className="chatbot-close" onClick={onClose}>✕</button>
      </div>
      <div className="chatbot-messages">
        {msgs.map((m,i)=><div key={i} className={`chat-msg ${m.role}`}>{m.text}</div>)}
        {typing && <div className="chat-msg bot" style={{opacity:.6}}>✍ Typing…</div>}
        <div ref={endRef}/>
      </div>
      <div className="chat-quick">
        {quickReplies.map(q=><button key={q} className="chat-quick-btn" onClick={()=>send(q)}>{q}</button>)}
      </div>
      <div className="chat-input-row">
        <input className="chat-input" placeholder="Ask anything…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
        <button className="chat-send" onClick={()=>send()}>➤</button>
      </div>
    </div>
  );
}

function Stars({rating}){return <div className="stars">{[1,2,3,4,5].map(i=><span key={i} className={"star "+(i<=Math.round(rating)?'on':'off')}>★</span>)}</div>;}

function QRCode({value}){
  const cells=[];
  for(let i=0;i<49;i++){const v=(value.charCodeAt(i%value.length)*31+i*17+i*i*7)%100;cells.push(v>45);}
  return <div className="qr-code">{cells.map((on,i)=><div key={i} className="qr-cell" style={{background:on?'var(--lav)':'transparent'}}/>)}</div>;
}

function useProfile(){
  const[profile,setProfile]=useState(()=>{try{return JSON.parse(localStorage.getItem('bmf_profile')||'{}');}catch{return{};}});
  function save(data){const p={...profile,...data};setProfile(p);try{localStorage.setItem('bmf_profile',JSON.stringify(p));}catch{}}
  return[profile,save];
}

function useRecentSearches(){
  const[searches,setSearches]=useState(()=>{try{return JSON.parse(localStorage.getItem('bmf_recent')||'[]');}catch{return[];}});
  function add(q){if(!q)return;const n=[q,...searches.filter(s=>s!==q)].slice(0,5);setSearches(n);try{localStorage.setItem('bmf_recent',JSON.stringify(n));}catch{}}
  return[searches,add];
}

/* ── BOOKING MODAL ── */
function BookingModal({ deal, onClose, onConfirm }) {
  const [step, setStep]     = useState(1);
  const [taken, setTaken]   = useState([]);
  const [unavDates, setUnavDates] = useState([]);
  const [datesLoading, setDatesLoading] = useState(true);
  const [form, setForm]     = useState({ name:'', phone:'', email:'', passengers:'1', seat:null, flightDate:'' });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [apiErr, setApiErr]   = useState('');
  const [result, setResult]   = useState(null);
  const [showFood, setShowFood] = useState(false);
  const [showCarbon, setShowCarbon] = useState(false);
  const [carbonData, setCarbonData] = useState(null);
  const [foodData, setFoodData]   = useState(null);
  const [foodCart, setFoodCart]   = useState([]);
  const [promo, setPromo]         = useState(null);
  const [baggage, setBaggage]     = useState('none');
  const [insurance, setInsurance] = useState('none');
  const [showBaggage, setShowBaggage]     = useState(false);
  const [showInsurance, setShowInsurance] = useState(false);

  function saveProfile(p){
    try { localStorage.setItem('bmf_profile', JSON.stringify(p)); } catch {}
  }

  useEffect(() => {
    api('GET', `/deals/${deal.id}/seats`).then(r=>setTaken(r.data.taken)).catch(()=>{});
    setDatesLoading(true);
    api('GET', `/deals/${deal.id}/unavailable-dates`).then(r=>{ setUnavDates(r.data.dates); setDatesLoading(false); }).catch(()=>setDatesLoading(false));
    api('GET', `/carbon?from=${deal.fromCode}&to=${deal.toCode}&passengers=1&seatClass=${encodeURIComponent(deal.seats)}`)
      .then(r=>setCarbonData(r.data)).catch(()=>{});
    api('GET', `/flights/food?airline=${encodeURIComponent(deal.airline)}&seatClass=${encodeURIComponent(deal.seats)}`)
      .then(r=>setFoodData(r.data)).catch(()=>{});
  }, [deal.id]);

  const taxes = Math.round(Number(form.passengers)*deal.price*.18);
  const foodTotal = foodCart.filter(i=>!i.included).reduce((s,i)=>s+i.price,0);
  const promoDiscount = promo ? (promo.type==='percent' ? Math.round(deal.price*Number(form.passengers)*promo.discount/100) : promo.discount) : 0;
  const baggagePrices = {none:0,'15kg':599,'20kg':849,'30kg':1199};
  const insurancePrices = {none:0,basic:299,standard:599,premium:999};
  const baggageCost = baggagePrices[baggage]||0;
  const insuranceCost = insurancePrices[insurance]||0;
  const total = Number(form.passengers)*deal.price+taxes-promoDiscount+baggageCost+insuranceCost+foodTotal;

  function validate() {
    const e={};
    if (!form.name.trim()) e.name='Name is required';
    if (!/^[6-9]\d{9}$/.test(form.phone)) e.phone='Enter valid 10-digit mobile number';
    if (form.email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email='Invalid email';
    if (!form.flightDate) e.flightDate='Please select a flight date';
    if (form.passengers==='1'&&!form.seat) e.seat='Please select a seat';
    return e;
  }

  async function submit() {
    const e=validate(); if(Object.keys(e).length){setErrors(e);return;}
    setLoading(true); setApiErr('');
    try {
      const res = await api('POST','/bookings',{dealId:deal.id,name:form.name,phone:form.phone,email:form.email,passengers:Number(form.passengers),seat:form.seat,flightDate:form.flightDate});
      saveProfile({name:form.name,phone:form.phone,email:form.email});
      setResult(res.data); onConfirm(res.data.ref); setStep(2);
    } catch(err){ setApiErr(err.message); } finally{ setLoading(false); }
  }

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const clr=k=>setErrors(e=>({...e,[k]:undefined}));

  if (step===2&&result) return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="success">
          <span className="sicon">🎉</span>
          <div className="stitle">Booking Confirmed!</div>
          <div className="ssub">Your booking is saved. Safe travels!</div>
          <div className="bref-box"><small>Booking Reference</small>{result.ref}</div>
          <div style={{background:'rgba(200,184,232,.06)',border:'1px solid var(--gb)',borderRadius:12,padding:'.85rem',margin:'.7rem 0',display:'flex',alignItems:'center',gap:'.9rem'}}>
            <QRCode value={result.ref+(deal.fromCode||'')+(deal.toCode||'')}/>
            <div><div style={{fontSize:'.8rem',fontWeight:600,color:'var(--lav)',marginBottom:'.22rem'}}>📱 Boarding Pass QR</div><div style={{fontSize:'.7rem',color:'var(--lav-mid)'}}>Show this at the airport check-in counter</div></div>
          </div>
          <div className="confirm-details">
            <div>✈ <strong>Route:</strong> {deal.from} → {deal.to}</div>
            <div>📅 <strong>Date:</strong> {formatDisplay(result.flightDate)}</div>
            <div>🛫 <strong>Airline:</strong> {deal.airline} · {deal.seats}</div>
            <div>💺 <strong>Seat:</strong> {result.seat} · {result.passengers} Pax</div>
            {baggage!=='none'&&<div>🧳 <strong>Baggage:</strong> {baggage} added</div>}
            {insurance!=='none'&&<div>🛡 <strong>Insurance:</strong> {insurance} plan</div>}
            {promo&&<div>🎟 <strong>Promo:</strong> {promo.code} applied</div>}
            {foodCart.length>0&&<div>🍽 <strong>Meals:</strong> {foodCart.map(i=>i.name).join(', ')}</div>}
            {carbonData&&<div>🌱 <strong>Carbon:</strong> {carbonData.totalCo2} kg CO₂</div>}
            <div>💰 <strong>Total Paid:</strong> ₹{total.toLocaleString()}</div>
          </div>
          <button className="submit-btn" onClick={onClose}>Done ✓</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}>✕</button>
        <div className="modal-title">Book Your Flight</div>
        <div className="modal-sub">📱 No account needed — your phone number is your booking ID</div>
        <div className="route-disp">
          <div className="rc-lg">{deal.fromCode}<small>{deal.from}</small></div>
          <span style={{color:'var(--rose)',fontSize:'1.25rem'}}>✈</span>
          <div className="rc-lg" style={{textAlign:'right'}}>{deal.toCode}<small>{deal.to}</small></div>
        </div>
        {carbonData && (
          <div style={{background:'rgba(80,200,120,.07)',border:'1px solid rgba(80,200,120,.2)',borderRadius:10,padding:'.5rem .85rem',fontSize:'.75rem',color:'var(--lav-mid)',marginBottom:'.9rem',display:'flex',alignItems:'center',gap:'.5rem'}}>
            🌱 This flight emits ~<strong style={{color:'var(--green)'}}>{carbonData.co2PerPassenger} kg CO₂</strong> per passenger
          </div>
        )}
        {apiErr && <div className="api-err">⚠ {apiErr}</div>}
        <div className="fsec">
          <label>Full Name *</label>
          <input className={`finput${errors.name?' err':''}`} placeholder="As on government ID" value={form.name} onChange={e=>{set('name',e.target.value);clr('name');}}/>
          {errors.name&&<div className="errtxt">{errors.name}</div>}
        </div>
        <div className="fsec">
          <label>📱 Mobile Number * <span style={{color:'var(--rose)',fontWeight:400,textTransform:'none',letterSpacing:0,fontSize:'.68rem'}}>(your booking ID)</span></label>
          <input className={`finput${errors.phone?' err':''}`} placeholder="10-digit e.g. 9876543210" value={form.phone} onChange={e=>{set('phone',e.target.value.replace(/\D/g,'').slice(0,10));clr('phone');}}/>
          {errors.phone&&<div className="errtxt">{errors.phone}</div>}
        </div>
        <div className="frow">
          <div className="fsec">
            <label>Email (optional)</label>
            <input className={`finput${errors.email?' err':''}`} placeholder="you@email.com" value={form.email} onChange={e=>{set('email',e.target.value);clr('email');}}/>
            {errors.email&&<div className="errtxt">{errors.email}</div>}
          </div>
          <div className="fsec">
            <label>Passengers</label>
            <select className="finput" value={form.passengers} onChange={e=>set('passengers',e.target.value)}>
              {[1,2,3,4,5].map(n=><option key={n} value={n}>{n} Pax</option>)}
            </select>
          </div>
        </div>

        <div className="fsec">
          <label>📅 Flight Date * {errors.flightDate&&<span style={{color:'#E85050',fontWeight:400,textTransform:'none',letterSpacing:0}}>— {errors.flightDate}</span>}</label>
          <FlightCalendar unavailableDates={unavDates} loading={datesLoading} selected={form.flightDate} onSelect={d=>{set('flightDate',d);clr('flightDate');}}/>
        </div>

        {form.passengers==='1' && (
          <div className="fsec">
            <label>Select Seat {errors.seat&&<span style={{color:'#E85050',fontWeight:400}}>— {errors.seat}</span>}</label>
            <SeatSelector dealId={deal.id} taken={taken} selected={form.seat} onSelect={s=>{set('seat',s);clr('seat');}}/>
          </div>
        )}

        {/* FOOD OPTIONS */}
        {foodData && (
          <div style={{marginBottom:'1rem'}}>
            <button className={`ftab${showFood?' on':''}`} onClick={()=>setShowFood(s=>!s)}>
              🍽 {showFood?'Hide':'Add'} In-Flight Meals ({foodData.items.length} options)
            </button>
            {showFood && (
              <div className="food-card" style={{marginTop:'.6rem'}}>
                <div style={{fontSize:'.73rem',color:'var(--lav-mid)',marginBottom:'.6rem'}}>{foodData.airline} · {foodData.seatClass}</div>
                {foodData.items.map(item=>{
                  const inCart=foodCart.find(i=>i.name===item.name);
                  return (
                    <div key={item.name} className="food-item" onClick={()=>setFoodCart(c=>inCart?c.filter(i=>i.name!==item.name):[...c,item])}
                      style={{cursor:'pointer',borderColor:inCart?'var(--lav-deep)':undefined}}>
                      <div className="food-icon">{item.icon}</div>
                      <div><div className="food-name">{item.name}</div><div className="food-type">{item.type}</div></div>
                      <div className="food-price">
                        {item.included?<div className="food-included">✓ Included</div>:<div className="food-price-val">₹{item.price}</div>}
                        {inCart&&<div style={{fontSize:'.62rem',color:'var(--green)',fontWeight:600}}>✓</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        <div className="fsec"><label>🎟 Promo Code</label><PromoBox onApply={setPromo} applied={promo}/></div>
        <div style={{marginBottom:'.9rem'}}>
          <button className={"ftab"+(showBaggage?' on':'')} onClick={()=>setShowBaggage(s=>!s)}>🧳 {showBaggage?'Hide':'Add'} Extra Baggage</button>
          {showBaggage&&<div style={{marginTop:'.55rem'}}><BaggageSelector selected={baggage} onSelect={setBaggage}/></div>}
        </div>
        <div style={{marginBottom:'.9rem'}}>
          <button className={"ftab"+(showInsurance?' on':'')} onClick={()=>setShowInsurance(s=>!s)}>🛡 {showInsurance?'Hide':'Add'} Travel Insurance</button>
          {showInsurance&&<div style={{marginTop:'.55rem'}}><InsuranceSelector selected={insurance} onSelect={setInsurance}/></div>}
        </div>
        <div className="price-sum">
          <div className="prow"><span>Base fare × {form.passengers}</span><span>₹{(deal.price*Number(form.passengers)).toLocaleString()}</span></div>
          <div className="prow"><span>GST (18%)</span><span>₹{taxes.toLocaleString()}</span></div>
          {promoDiscount>0&&<div className="prow" style={{color:'var(--green)'}}><span>🎉 Promo ({promo.code})</span><span>−₹{promoDiscount.toLocaleString()}</span></div>}
          {baggageCost>0&&<div className="prow"><span>🧳 Extra baggage</span><span>+₹{baggageCost.toLocaleString()}</span></div>}
          {insuranceCost>0&&<div className="prow"><span>🛡 Travel insurance</span><span>+₹{insuranceCost.toLocaleString()}</span></div>}
          {foodTotal>0&&<div className="prow"><span>🍽 Meal add-ons</span><span>+₹{foodTotal.toLocaleString()}</span></div>}
          <div className="prow total"><span>Total</span><span>₹{total.toLocaleString()}</span></div>
        </div>
        <button className="submit-btn" disabled={loading} onClick={submit}>{loading?'⏳ Booking…':'Confirm Booking →'}</button>
      </div>
    </div>
  );
}

  });

  const load = useCallback(async () => {
    try { const r=await api('GET','/deals'); setDeals(r.data); } catch {}
    setLoading(false);
  },[]);
