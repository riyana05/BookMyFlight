    const v = val.trim();
    if (!v) return;
    setRecentSearches(prev=>{
      const next = [v, ...prev.filter(s=>s.toLowerCase()!==v.toLowerCase())].slice(0,5);
      try { localStorage.setItem('bmf_recent_searches', JSON.stringify(next)); } catch {}
      return next;
    });
  }
  function handleSearch(val){setQ(val);if(val.length>2)addSearch(val);}
  useEffect(()=>{ load(); const t=setInterval(load,30000); return()=>clearInterval(t); },[]);
  const shown=deals.filter(d=>{
    const ql=q.toLowerCase();
    return (!ql||d.from.toLowerCase().includes(ql)||d.to.toLowerCase().includes(ql)||d.fromCode.toLowerCase().includes(ql)||d.toCode.toLowerCase().includes(ql))
      &&(filt==='All'||d.seats===filt);
  });
  return (
    <div className="page">
      <div className="hero">
        <div className="hero-eye">✦ Live Special Deals — Updated Throughout the Day ✦</div>
        <h1 className="hero-title">Fly to your<br/><em>Dream Destination</em></h1>
        <p className="hero-sub">Exclusive fares · No account required · Pick your date · Book with phone number</p>
      </div>
      <div className="search-wrap">
        <div className="search-bar">
          <span style={{color:'var(--lav-mid)'}}>🔍</span>
          <input placeholder="Search city or airport code…" value={q} onChange={e=>handleSearch(e.target.value)}/>
          {q&&<span style={{cursor:'pointer',color:'var(--lav-mid)'}} onClick={()=>setQ('')}>✕</span>}
        </div>
        {recentSearches.length>0&&!q&&<div style={{display:'flex',justifyContent:'center',flexWrap:'wrap',marginBottom:'.55rem'}}>{recentSearches.map(s=><div key={s} className="recent-chip" onClick={()=>setQ(s)}>🕐 {s}</div>)}</div>}
        <div className="filter-row">
          {filters.map(f=><div key={f} className={`chip${filt===f?' on':''}`} onClick={()=>setFilt(f)}>{f}</div>)}
        </div>
      </div>
      <div className="deals-hdr">
        <div className="sec-title">Today's Deals</div>
        <div style={{display:'flex',gap:'.5rem',alignItems:'center',flexWrap:'wrap'}}>
          <button style={{background:'rgba(155,126,200,.12)',border:'1px solid rgba(155,126,200,.25)',borderRadius:20,padding:'.25rem .75rem',color:'var(--lav-mid)',fontSize:'.7rem',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}} onClick={onWaitlist}>🔔 Set Price Alert</button>
          <div className="live-badge"><div className="live-dot"/>LIVE · {shown.length}</div>
        </div>
      </div>
      {loading?<div className="loading"><div className="spin">✈</div><p>Loading deals…</p></div>
        :shown.length===0?<div className="empty"><div className="eicon">🛫</div><p>No deals match your search</p></div>
        :<div className="deals-grid">{shown.map(d=><DealCard key={d.id} deal={d} onBook={onBook}/>)}</div>}
    </div>
  );
}

/* ── MY BOOKINGS ── */
function MyBookingsPage() {
  const [phone, setPhone] = useState('');
  const [bookings, setBookings] = useState([]);
  const [searched, setSearched] = useState(false);
  const [loading, setLoading]   = useState(false);
  const [sessionRefs, setSessionRefs] = useState([]);
  const [profile] = useProfile();
  useEffect(()=>{ api('GET','/bookings/session').then(r=>setSessionRefs(r.data)).catch(()=>{}); if(profile.phone) setPhone(profile.phone); },[]);
  async function lookup(){
    if(!/^[6-9]\d{9}$/.test(phone)) return;
    setLoading(true);
    try{ const r=await api('GET',`/bookings?phone=${phone}`); setBookings(r.data); setSearched(true); }catch{}
    setLoading(false);
  }
  return (
    <div className="page">
      <div className="pg-wrap">
        <div className="pg-hdr"><h2>My Bookings</h2><p>Enter the mobile number you used when booking to retrieve your flights</p></div>
        {sessionRefs.length>0&&<div className="session-note">🍪 <span>Your current session has <strong style={{color:'var(--lav)'}}>{sessionRefs.length}</strong> booking{sessionRefs.length>1?'s':''} — enter your phone to view details</span></div>}
        <div className="phone-form">
          <input className="finput" style={{maxWidth:265}} placeholder="10-digit mobile number" value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,10))} onKeyDown={e=>e.key==='Enter'&&lookup()}/>
          <button className="submit-btn" style={{width:'auto',padding:'.65rem 1.35rem'}} onClick={lookup} disabled={loading}>{loading?'⏳':'Look Up →'}</button>
        </div>
        {searched&&bookings.length===0&&<div className="empty"><div className="eicon">🔍</div><p>No bookings found for this number</p></div>}
        {bookings.map(b=>(
          <div key={b.id} className="bk-item">
            <div><div className="bk-ref">{b.ref}</div><div className="badge badge-ok">{b.status}</div></div>
            <div className="bk-info">
              <div className="bk-route">{b.from} → {b.to}</div>
              <div className="bk-det">{b.airline} · {b.seatClass} · Seat {b.seat} · {b.passengers} Pax</div>
              {b.flightDate&&<div className="flight-date-badge">📅 {formatDisplay(b.flightDate)}</div>}
              <div className="bk-det" style={{marginTop:'.2rem'}}>Booked: {new Date(b.bookedAt).toLocaleString()}</div>
            </div>
            <div className="bk-price">₹{b.total.toLocaleString()}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── USER LOGIN (Email + OTP) ── */
function UserAuthModal({ onClose, onLogin }) {
  const [step,setStep]=useState('email'); // 'email' | 'code'
  const [email,setEmail]=useState('');
  const [code,setCode]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [cooldown,setCooldown]=useState(0);

  useEffect(()=>{
    if(cooldown<=0) return;
    const t=setInterval(()=>setCooldown(c=>Math.max(0,c-1)),1000);
    return ()=>clearInterval(t);
  },[cooldown]);

  async function sendCode(){
    if(cooldown>0||loading) return;
    if(!email.trim()){setErr('Please enter your email address.');return;}
    setLoading(true);setErr('');
    try{
      await api('POST','/auth/email/request-otp',{email:email.trim()});
      setStep('code');setCode('');setCooldown(60);
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  }

  async function verify(){
    if(!code.trim()){setErr('Please enter the 6-digit code.');return;}
    setLoading(true);setErr('');
    try{
      const r=await api('POST','/auth/email/verify-otp',{email:email.trim(),code:code.trim()});
      onLogin(r.email);
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="user-login-card">
        <button className="modal-close" onClick={onClose}>✕</button>
        <span className="login-icon">📧</span>
        <div className="login-title">{step==='email'?'Sign In':'Verify Your Email'}</div>
        <div className="login-sub">
          {step==='email'?'Enter your email — we\'ll send you a sign-in code':`We sent a 6-digit code to ${email}`}
        </div>
        {err&&<div className="login-err">⚠ {err}</div>}
        {step==='email'?(
          <>
            <div className="fsec" style={{textAlign:'left'}}>
              <label>Email Address</label>
              <input className="finput" type="email" placeholder="you@example.com" value={email}
                onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendCode()} autoFocus/>
            </div>
            <button className="submit-btn" disabled={loading} onClick={sendCode}>{loading?'⏳ Sending…':'Send Code →'}</button>
          </>
        ):(
          <>
            <div className="fsec" style={{textAlign:'left'}}>
              <label>6-Digit Code</label>
              <input className="finput otp-input" maxLength={6} inputMode="numeric" placeholder="000000" value={code}
                onChange={e=>setCode(e.target.value.replace(/\D/g,'').slice(0,6))} onKeyDown={e=>e.key==='Enter'&&verify()} autoFocus/>
            </div>
            <div className="resend-row">
              <button className="change-email-link" onClick={()=>{setStep('email');setCode('');setErr('');}}>← Change email</button>
              <button className="resend-link" disabled={cooldown>0||loading} onClick={sendCode}>{cooldown>0?`Resend in ${cooldown}s`:'Resend code'}</button>
            </div>
            <button className="submit-btn" disabled={loading} onClick={verify}>{loading?'⏳ Verifying…':'Verify & Sign In →'}</button>
          </>
        )}
      </div>
    </div>
  );
}

/* ── ADMIN LOGIN ── */
function AdminLogin({ onLogin }) {
  const [user,setUser]=useState('');const [pass,setPass]=useState('');
  const [show,setShow]=useState(false);const [err,setErr]=useState('');const [loading,setLoading]=useState(false);
  async function attempt(){setLoading(true);setErr('');try{await api('POST','/auth/login',{username:user,password:pass});onLogin();}catch(e){setErr(e.message);}finally{setLoading(false);}}
  return(
    <div className="admin-login-wrap">
      <div className="admin-login-card">
        <span className="login-icon">🔐</span>
        <div className="login-title">Admin Portal</div>
        <div className="login-sub">Sign in to manage deals and view bookings</div>
        {err&&<div className="login-err">⚠ {err}</div>}
        <div className="fsec" style={{textAlign:'left'}}>
          <label>Username</label>
          <input className="finput" placeholder="admin" value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==='Enter'&&attempt()}/>
        </div>
        <div className="fsec" style={{textAlign:'left'}}>
          <label>Password</label>
          <div style={{position:'relative'}}>
            <input className="finput" type={show?'text':'password'} placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&attempt()} style={{paddingRight:'2.5rem'}}/>
            <span style={{position:'absolute',right:'.8rem',top:'50%',transform:'translateY(-50%)',cursor:'pointer',color:'var(--lav-mid)',fontSize:'.8rem'}} onClick={()=>setShow(s=>!s)}>{show?'🙈':'👁'}</span>
          </div>
        </div>
        <button className="submit-btn" disabled={loading} onClick={attempt}>{loading?'⏳ Signing in…':'Sign In →'}</button>
      </div>
    </div>
  );
}

/* ── ADMIN DASHBOARD ── */
function AdminDashboard({ onLogout, onToast }) {
  const blank={from:'',fromCode:'',to:'',toCode:'',price:'',airline:'',seats:'Economy',duration:'',expiresInSeconds:'3600',featured:false};
  const [deals,setDeals]=useState([]);const [bookings,setBookings]=useState([]);
  const [form,setForm]=useState(blank);const [editId,setEditId]=useState(null);
  const [errors,setErrors]=useState({});const [apiErr,setApiErr]=useState('');
  const [loading,setLoading]=useState(true);const [view,setView]=useState('deals');
  const load=useCallback(async()=>{
    setLoading(true);
    try{const[d,b]=await Promise.all([api('GET','/admin/deals'),api('GET','/admin/bookings')]);setDeals(d.data);setBookings(b.data);}catch{}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[]);
  function validate(){const e={};if(!form.from.trim())e.from=true;if(!form.fromCode.trim())e.fromCode=true;if(!form.to.trim())e.to=true;if(!form.toCode.trim())e.toCode=true;if(!form.price||isNaN(form.price)||Number(form.price)<1)e.price=true;if(!form.airline.trim())e.airline=true;if(!form.duration.trim())e.duration=true;return e;}
  async function save(){const e=validate();if(Object.keys(e).length){setErrors(e);return;}
    try{if(editId){await api('PUT',`/admin/deals/${editId}`,{...form,price:Number(form.price),expiresInSeconds:Number(form.expiresInSeconds)});onToast('Deal updated ✓');}
    else{await api('POST','/admin/deals',{...form,price:Number(form.price),expiresInSeconds:Number(form.expiresInSeconds)});onToast('Deal created ✓');}
    setForm(blank);setEditId(null);setErrors({});load();}catch(err){setApiErr(err.message);}
  }
  async function remove(id){try{await api('DELETE',`/admin/deals/${id}`);onToast('Deal deleted');load();}catch(err){setApiErr(err.message);}}
  function edit(d){setForm({...d,price:String(d.price),expiresInSeconds:String(d.expiresInSeconds||3600)});setEditId(d.id);}
  const sf=(k,v)=>{setForm(f=>({...f,[k]:v}));setErrors(e=>({...e,[k]:false}));};
  function inp(k,ph,lbl){return(<div className="fsec">{lbl&&<label>{lbl}</label>}<input className={`finput${errors[k]?' err':''}`} placeholder={ph} value={form[k]} onChange={e=>sf(k,e.target.value)}/></div>);}
  const revenue=bookings.reduce((s,b)=>s+(b.total||0),0);
  return(
    <div className="page">
      <div className="admin-wrap">
        <div className="pg-hdr" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:'1rem'}}>
          <div><h2>Admin Dashboard</h2><p style={{color:'var(--lav-mid)'}}>Manage deals · Monitor bookings · Session active 🔒</p></div>
          <button className="logout-btn" onClick={onLogout}>🔓 Logout</button>
        </div>
        <div className="stats-row">
          <div className="stat-card"><div className="stat-val">{deals.length}</div><div className="stat-lbl">Total Deals</div></div>
          <div className="stat-card"><div className="stat-val">{deals.filter(d=>d.secondsLeft>0).length}</div><div className="stat-lbl">Active Deals</div></div>
          <div className="stat-card"><div className="stat-val">{bookings.length}</div><div className="stat-lbl">Bookings</div></div>
          <div className="stat-card"><div className="stat-val">₹{(revenue/1000).toFixed(1)}K</div><div className="stat-lbl">Revenue</div></div>
        </div>
        {apiErr&&<div className="api-err">⚠ {apiErr}</div>}
        <div style={{display:'flex',gap:'.42rem',marginBottom:'1.3rem',flexWrap:'wrap'}}>
          <div className={`chip${view==='deals'?' on':''}`} onClick={()=>setView('deals')}>Manage Deals</div>
          <div className={`chip${view==='bookings'?' on':''}`} onClick={()=>setView('bookings')}>Bookings ({bookings.length})</div>
          <div className={`chip${view==='analytics'?' on':''}`} onClick={()=>setView('analytics')}>📊 Analytics</div>
        </div>
        {view==='analytics' && <AnalyticsPanel/>}
        {view==='deals'&&(
          <div className="admin-grid">
            <div className="aform-card">
              <div className="aform-title">{editId?'✏️ Edit Deal':'＋ Create New Deal'}</div>
              <div className="frow">{inp('from','e.g. Mumbai','From City')}{inp('fromCode','e.g. BOM','IATA Code')}</div>
              <div className="frow">{inp('to','e.g. Delhi','To City')}{inp('toCode','e.g. DEL','IATA Code')}</div>
              <div className="frow">
                <div className="fsec"><label>Price (₹)</label><input className={`finput${errors.price?' err':''}`} placeholder="4299" value={form.price} onChange={e=>sf('price',e.target.value)}/></div>
                {inp('airline','e.g. IndiGo','Airline')}
              </div>
              <div className="frow">
                <div className="fsec"><label>Class</label><select className="finput" value={form.seats} onChange={e=>sf('seats',e.target.value)}><option>Economy</option><option>Business</option><option>Premium Economy</option></select></div>
                {inp('duration','e.g. 2h 30m','Duration')}
              </div>
              <div className="fsec"><label>Expires In</label>
                <select className="finput" value={form.expiresInSeconds} onChange={e=>sf('expiresInSeconds',e.target.value)}>
                  <option value="900">15 minutes</option><option value="1800">30 minutes</option>
                  <option value="3600">1 hour</option><option value="7200">2 hours</option>
                  <option value="10800">3 hours</option><option value="21600">6 hours</option>
                </select>
              </div>
              <div className="fsec" style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
                <input type="checkbox" id="feat" checked={form.featured} onChange={e=>sf('featured',e.target.checked)} style={{accentColor:'var(--purple)',width:14,height:14}}/>
                <label htmlFor="feat" style={{textTransform:'none',fontSize:'.8rem',color:'var(--lav-mid)',letterSpacing:0}}>Featured (Hot Deal ⭐)</label>
              </div>
              <div style={{display:'flex',gap:'.45rem'}}>
                <button className="submit-btn" style={{flex:1}} onClick={save}>{editId?'Update Deal':'Create Deal'}</button>
                {editId&&<button className="ibtn" style={{padding:'.65rem .95rem'}} onClick={()=>{setForm(blank);setEditId(null);}}>✕</button>}
              </div>
            </div>
            <div>
              <div style={{color:'var(--lav)',fontWeight:600,marginBottom:'.9rem',fontSize:'.9rem'}}>All Deals ({deals.length})</div>
              {loading?<div className="loading"><div className="spin">⏳</div></div>:(
                <div className="admin-list">
                  {deals.length===0&&<div style={{color:'var(--lav-mid)',fontSize:'.85rem'}}>No deals yet</div>}
                  {deals.map(d=>(
                    <div key={d.id} className="admin-item">
                      <div className="ai-route"><strong>{d.fromCode} → {d.toCode}</strong><small>{d.from} → {d.to} · {d.airline} · {d.seats}</small></div>
                      <div><div className="ai-price">₹{d.price.toLocaleString()}</div><div className="ai-exp">{d.secondsLeft>0?`⏱ ${Math.floor(d.secondsLeft/60)}m left`:'⛔ Expired'}</div></div>
                      <div className="ai-actions">
                        <button className="ibtn" onClick={()=>edit(d)}>✏️</button>
                        <button className="ibtn del" onClick={()=>remove(d.id)}>🗑</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
        {view==='bookings'&&(
          loading?<div className="loading"><div className="spin">⏳</div></div>
          :bookings.length===0?<div className="empty"><div className="eicon">📋</div><p>No bookings yet</p></div>
          :<div style={{overflowX:'auto'}}>
            <table className="ab-table">
              <thead><tr><th>Ref</th><th>Route</th><th>Flight Date</th><th>Passenger</th><th>Phone</th><th>Class</th><th>Seat</th><th>Pax</th><th>Total</th></tr></thead>
              <tbody>
                {bookings.map(b=>(
                  <tr key={b.id}>
                    <td><strong style={{color:'var(--rose)'}}>{b.ref}</strong></td>
                    <td>{b.fromCode} → {b.toCode}</td>
                    <td><span style={{color:'var(--lav-mid)',fontSize:'.75rem'}}>📅 {b.flightDate?formatDisplay(b.flightDate):'—'}</span></td>
                    <td>{b.name}</td><td>{b.phone}</td><td>{b.seatClass}</td><td>{b.seat}</td><td>{b.passengers}</td>
                    <td>₹{b.total.toLocaleString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [tab,setTab]=useState('home');
  const [bookingDeal,setBookingDeal]=useState(null);
  const [toast,setToast]=useState('');
  const [adminLoggedIn,setAdminLoggedIn]=useState(false);
  const [userLoggedIn,setUserLoggedIn]=useState(false);
  const [userEmail,setUserEmail]=useState('');
  const [showUserAuth,setShowUserAuth]=useState(false);
  const [showWaitlist,setShowWaitlist]=useState(false);
  const [sessionChecked,setSessionChecked]=useState(false);
  const [chatOpen,setChatOpen]=useState(false);

  useEffect(()=>{
    Promise.allSettled([
      api('GET','/auth/status').then(r=>setAdminLoggedIn(r.isAdmin)),
      api('GET','/auth/email/status').then(r=>{ if(r.loggedIn){ setUserLoggedIn(true); setUserEmail(r.email); } }),
    ]).finally(()=>setSessionChecked(true));
  },[]);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(''),3000);}
  async function handleLogout(){try{await api('POST','/auth/logout');}catch{}setAdminLoggedIn(false);setTab('home');showToast('Logged out successfully');}
  async function handleUserLogout(){try{await api('POST','/auth/email/logout');}catch{}setUserLoggedIn(false);setUserEmail('');showToast('Signed out successfully');}

  if(!sessionChecked) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'var(--lav-mid)'}}>
      <div style={{textAlign:'center'}}><div style={{fontSize:'2rem',marginBottom:'.5rem'}}>✈</div><div>Loading…</div></div>
    </div>
  );

  const tabs=[
    {id:'home',label:'✈ Deals'},
    {id:'multicity',label:'🗺 Multi-City'},
    {id:'services',label:'🛫 Services'},
    {id:'bookings',label:'📋 My Bookings'},
    {id:'admin',label:'⚙ Admin'},
  ];

  return(
    <>
      <nav className="nav">
        <div className="nav-logo">✈ BookMyFlight</div>
        <div className="nav-tabs">
          {tabs.map(t=>(
            <button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
              {t.label}
              {t.id==='admin'&&adminLoggedIn&&<span style={{marginLeft:'.28rem',fontSize:'.6rem',color:'#50C878'}}>●</span>}
            </button>
          ))}
        </div>
        <div className="nav-right">
          {tab!=='admin'&&(
            <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
              <div className="session-pill">📱 Book with phone</div>
              {userLoggedIn?(
                <>
                  <div className="email-pill" title={userEmail}>👤 {userEmail}</div>
                  <button className="logout-btn" onClick={handleUserLogout}>Logout</button>
                </>
              ):(
                <button className="signin-btn" onClick={()=>setShowUserAuth(true)}>👤 Sign In</button>
              )}
            </div>
          )}
          {tab==='admin'&&adminLoggedIn&&(<div style={{display:'flex',alignItems:'center',gap:'.5rem'}}><div className="session-pill">🔒 Active</div><button className="logout-btn" onClick={handleLogout}>Logout</button></div>)}
        </div>
      </nav>

      {tab==='home'     && <HomePage onBook={d=>setBookingDeal(d)} onWaitlist={()=>setShowWaitlist(true)}/>}
      {tab==='multicity'&& <MultiCityPage/>}
      {tab==='services' && <ServicesPage onBook={d=>setBookingDeal(d)}/>}
      {tab==='bookings' && <MyBookingsPage/>}
      {tab==='admin'    && (adminLoggedIn?<AdminDashboard onLogout={handleLogout} onToast={showToast}/>:<AdminLogin onLogin={()=>setAdminLoggedIn(true)}/>)}

      {bookingDeal&&(
        <BookingModal deal={bookingDeal} onClose={()=>setBookingDeal(null)} onConfirm={ref=>showToast(`✈ Booking confirmed! Ref: ${ref}`)}/>
      )}

      {showUserAuth && (
        <UserAuthModal
          onClose={()=>setShowUserAuth(false)}
          onLogin={email=>{setUserLoggedIn(true);setUserEmail(email);setShowUserAuth(false);showToast(`Welcome, ${email}! 🎉`);}}
        />
      )}

      {/* CHATBOT */}
      {showWaitlist && <WaitlistModal onClose={()=>setShowWaitlist(false)} onToast={showToast}/>}
      {chatOpen && <Chatbot onClose={()=>setChatOpen(false)}/>}
      {!chatOpen && <button className="chatbot-fab" onClick={()=>setChatOpen(true)} title="Travel Assistant">🤖</button>}

      {toast&&<div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
